# Run the whole app locally: `docker compose up --build`.
# Postgres + application (TECHNICAL_DESIGN §9 — Postgres via Docker).
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: career_coach
      POSTGRES_USER: career
      POSTGRES_PASSWORD: career
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career -d career_coach"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/career_coach
      SPRING_DATASOURCE_USERNAME: career
      SPRING_DATASOURCE_PASSWORD: career
    ports:
      - "8080:8080"

volumes:
  pgdata:
