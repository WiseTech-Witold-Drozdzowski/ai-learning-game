# Test environment — used by run-tests.sh.
# Throwaway Postgres + a Gradle container running the tests against it.
services:
  test-db:
    image: postgres:17
    environment:
      POSTGRES_DB: career_coach_test
      POSTGRES_USER: career
      POSTGRES_PASSWORD: career
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career -d career_coach_test"]
      interval: 3s
      timeout: 3s
      retries: 20

  test:
    image: gradle:jdk25
    # Run as the host user (set by run-tests.sh) so build/ and .gradle/ files
    # in the mounted tree are not created as root.
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      test-db:
        condition: service_healthy
    working_dir: /home/gradle/project
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://test-db:5432/career_coach_test
      SPRING_DATASOURCE_USERNAME: career
      SPRING_DATASOURCE_PASSWORD: career
      # Gradle cache inside the mounted tree (survives between runs).
      GRADLE_USER_HOME: /home/gradle/project/.gradle
    volumes:
      - .:/home/gradle/project
    # Use the Gradle bundled in the image (9.6.1) — no distribution download.
    command: gradle --no-daemon test
