# Test-only Flyway override (issue-3).
#
# The test suite runs against a Postgres container (docker-compose.test.yml) that
# can survive between runs. When a not-yet-released migration (e.g. V4) is edited
# across attempts, its checksum drifts from what a leftover container already
# recorded in flyway_schema_history, and Flyway aborts context startup with a
# "checksum mismatch" validation error — failing every @SpringBootTest.
#
# Modern Flyway (bundled with Spring Boot 4) removed `cleanOnValidationError`, so
# the old `spring.flyway.clean-on-validation-error` property is a no-op. For a
# throwaway test database the safe remedy is to skip Flyway's on-migrate checksum
# validation: the migration version is already applied and its schema is identical,
# so `migrate()` is a no-op and Hibernate's `ddl-auto: validate` still confirms the
# entity/schema match. This is scoped to test resources only and merges with (does
# not shadow) the main application.yml, so production keeps full validation.
spring.flyway.validate-on-migrate=false

# Job poller determinism (issue-1): the scheduled poll runs every ~1s in any full
# Spring context. Disabling it globally keeps every @SpringBootTest deterministic;
# job tests trigger the poller explicitly via JobRunner.pollOnce().
careercoach.jobs.scheduler-enabled=false

# Connection-pool ceiling for the test suite. Each distinct @SpringBootTest context is
# cached with its own HikariCP pool; at the default max-pool-size (10) the growing number
# of contexts exhausts the throwaway Postgres' max_connections ("too many clients already").
# The suite runs sequentially, so a few connections per context is ample.
spring.datasource.hikari.maximum-pool-size=4
