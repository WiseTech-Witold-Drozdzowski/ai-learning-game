spring:
  application:
    name: career-coach

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/career_coach}
    username: ${SPRING_DATASOURCE_USERNAME:career}
    password: ${SPRING_DATASOURCE_PASSWORD:career}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway is the source of truth for the schema; Hibernate only validates it matches.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

careercoach:
  ai:
    # OpenRouter chat port (TECHNICAL_DESIGN §3). API key via OPENROUTER_API_KEY.
    openrouter:
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:openai/gpt-4o-mini}
  auth:
    # Email whitelist (TECHNICAL_DESIGN §7) — only these Google accounts may sign in.
    # Comma-separated via AUTH_EMAIL_WHITELIST; empty by default.
    whitelist: ${AUTH_EMAIL_WHITELIST:}
  config:
    # Default catalog seeded into the DB on startup (insert-if-absent, issue-2).
    task-types:
      - key: HONOR_CHECK
        display-name: "Honor check"
        verification-method: HONOR
        exp-base: 10
        exp-scale-by-score: false
        requires-artifact: false
      - key: HONOR_WITH_PROOF
        display-name: "Honor check with proof"
        verification-method: HONOR_WITH_PROOF
        exp-base: 20
        exp-scale-by-score: false
        requires-artifact: true
    skills:
      - key: JAVA
        display-name: "Java"
        category: TECHNICAL
      - key: SPRING
        display-name: "Spring"
        category: TECHNICAL
      - key: COMMUNICATION
        display-name: "Communication"
        category: SOFT

management:
  endpoints:
    web:
      exposure:
        include: health,info
