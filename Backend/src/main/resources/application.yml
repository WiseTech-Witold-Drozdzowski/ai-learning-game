spring:
  application:
    name: career-coach

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/career_coach}
    username: ${SPRING_DATASOURCE_USERNAME:career}
    password: ${SPRING_DATASOURCE_PASSWORD:career}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway is the source of truth for the schema; Hibernate only validates it matches.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

careercoach:
  auth:
    # Email whitelist (TECHNICAL_DESIGN §7) — only these Google accounts may sign in.
    # Comma-separated via AUTH_EMAIL_WHITELIST; empty by default.
    whitelist: ${AUTH_EMAIL_WHITELIST:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
